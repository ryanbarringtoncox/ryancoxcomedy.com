<head lang="en">

  <meta charset="utf-8" />
  <title>{{ .Title }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" >
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" >

  {{ with .Site.Params.author }}
  <meta name="author" content="{{ . }}">
  {{ end }}
  {{ hugo.Generator }}

  <meta property="og:description" content="Official Website for Stand-Up Comedian Ryan Cox" >
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://ryancoxcomedy.com" >
  {{ with .Site.Params.featuredImage }}
  <meta property="og:image" content="{{ .  | absURL }}" >
  {{ end }}

  <link rel="stylesheet" href={{ "plugins/font-awesome/css/font-awesome.min.css" | absURL }} >
  {{ $style := resources.Get "scss/style.scss" | resources.ToCSS | minify}}
  <link href="{{ $style.Permalink }}" rel="stylesheet" >

  <link rel="icon" type="image/png" href="/images/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/images/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Ryan Cox Comedy" />
